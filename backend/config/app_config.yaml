# DeepTutor 应用配置
# 可被环境变量覆盖（如 EMBEDDING_API_KEY、LLM_MODEL）

# Embedding（Silicon Flow BGE）
embedding:
  provider: silicon_flow
  base_url: "https://api.siliconflow.cn/v1"
  api_key: ""   # 必填：从 https://cloud.siliconflow.cn/account/ak 获取
  model: "BAAI/bge-large-zh-v1.5"
  batch_size: 32
  timeout: 60.0

# LLM 对话
llm:
  provider: openai
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"
  timeout: 120.0

# RAG
rag:
  chunk_size: 512
  chunk_overlap: 50
  vector_top_k: 10
  bm25_top_k: 10
  hybrid_top_k: 5
  rrf_k: 60
  persist_chroma_path: knowledge_bases
  persist_bm25_filename: bm25_index.pkl

# GraphRAG
graph_rag:
  enabled: true
  max_entities_per_chunk: 5
  max_relations_per_chunk: 10
  community_summary_max_nodes: 20
  graph_filename: graph.json
